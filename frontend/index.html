<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MawaqitduGazole</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SETUP (première visite) ─────────────────────────── -->
  <div id="setup-screen" class="screen">

    <div class="setup-brand">
      <h1 class="setup-brand__name">MawaqitduGazole</h1>
      <p class="setup-brand__tagline">Le prix le moins cher, maintenant.</p>
    </div>

    <form id="setup-form" class="setup-form">

      <div class="field">
        <label class="field-label">Mon carburant</label>
        <div class="fuel-grid">
          <button type="button" class="fuel-btn" data-fuel="Gazole">Diesel</button>
          <button type="button" class="fuel-btn" data-fuel="SP95">SP95</button>
          <button type="button" class="fuel-btn" data-fuel="SP98">SP98</button>
          <button type="button" class="fuel-btn" data-fuel="E10">E10</button>
          <button type="button" class="fuel-btn" data-fuel="E85">E85</button>
          <button type="button" class="fuel-btn" data-fuel="GPLc">GPL</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Ma position</label>
        <button type="button" id="geolocate-btn" class="geo-btn">
          Utiliser ma position GPS
        </button>
        <div id="geo-status" class="status-line"></div>
        <div id="geo-fallback" class="geo-fallback hidden">
          <div class="autocomplete-wrapper">
            <div class="geo-fallback-row">
              <input
                type="text"
                id="location-input"
                class="text-input"
                placeholder="Ville ou code postal…"
                autocomplete="off"
              />
              <button type="button" id="location-search-btn" class="search-btn">
                Rechercher
              </button>
            </div>
            <ul id="city-suggestions" class="city-suggestions hidden"></ul>
          </div>
          <div id="location-status" class="status-line"></div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Rayon — <span id="radius-label">5 km</span></label>
        <input type="range" id="radius-input" min="1" max="30" value="5" class="radius-slider" />
      </div>

      <button type="submit" id="start-btn" class="start-btn" disabled>
        Afficher le prix
      </button>

    </form>
  </div>


  <!-- ── PRICE SCREEN (après setup) ─────────────────────── -->
  <div id="widget-screen" class="screen hidden">

    <header class="app-header">
      <span class="app-brand">MawaqitduGazole</span>
      <button id="reset-btn" class="header-action">Autres parametres</button>
    </header>

    <main class="price-hero">

      <div id="loading-state" class="state">
        <div class="spinner"></div>
      </div>

      <div id="result-state" class="state hidden">
        <div class="price-display">
          <span id="price-value" class="price-value">—</span>
          <span class="price-unit">€/L</span>
        </div>
        <p class="fuel-label" id="fuel-tag"></p>
        <p class="station-name" id="station-name"></p>
        <p class="station-dist" id="station-dist"></p>
        <button id="maps-btn" class="maps-btn">Y aller</button>
      </div>

      <div id="no-result-state" class="state hidden">
        <p class="no-result-msg">Aucune station dans ce rayon.</p>
        <button id="expand-btn" class="ghost-btn">Élargir le rayon</button>
      </div>

    </main>

    <footer class="app-footer">
      <span id="last-update" class="footer-meta">—</span>
      <span class="footer-sep">·</span>
      <span id="db-count" class="footer-meta">—</span>
      <span class="footer-sep">·</span>
      <button id="compare-btn" class="footer-link">5 moins chères</button>
    </footer>

  </div>


  <!-- ── COMPARE PANEL (bottom sheet) ────────────────────── -->
  <div id="compare-overlay" class="compare-overlay hidden"></div>
  <div id="compare-panel" class="compare-panel hidden">
    <div class="compare-header">
      <span class="compare-title">Stations proches <span id="topbar-fuel-badge" class="compare-fuel-badge"></span></span>
      <button id="compare-close" class="compare-close">Fermer</button>
    </div>
    <div class="compare-body">
      <table id="top5-table">
        <tbody id="top5-body"></tbody>
      </table>
    </div>
  </div>


  <!-- ── LOG PANEL (développeur) ─────────────────────────── -->
  <div id="log-panel" class="log-panel hidden">
    <div class="log-panel__header">
      <div class="log-tabs">
        <button class="log-tab active" data-tab="api">API</button>
        <button class="log-tab" data-tab="ingestion">Ingestion</button>
      </div>
      <div class="log-panel__actions">
        <button id="log-clear-btn" class="log-action-btn">Effacer</button>
        <button id="log-close-btn" class="log-action-btn">✕</button>
      </div>
    </div>
    <div class="log-body">
      <div id="log-pane-api" class="log-pane active"></div>
      <div id="log-pane-ingestion" class="log-pane hidden"></div>
    </div>
  </div>
  <button id="log-toggle-btn" class="log-toggle-btn hidden">Logs</button>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"
          integrity="sha512-3zf8MdEZUh+yP0BuXAhN6U7ZrmG5OuKqd3ME6rWPd1TqGJfQcSFCFN+AqnfZsFVvsb4j4b+FOPJ6HEOxBGkQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="app.js"></script>
</body>
</html>
