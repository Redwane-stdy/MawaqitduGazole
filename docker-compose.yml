version: "3.9"

services:
  # ── PostgreSQL + PostGIS ────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gazole_db
    environment:
      POSTGRES_USER: gazole
      POSTGRES_PASSWORD: gazole
      POSTGRES_DB: gazole
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gazole"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go ingestion service ────────────────────────────────────
  ingestion:
    build: ./ingestion
    container_name: gazole_ingestion
    environment:
      DATABASE_URL: postgres://gazole:gazole@postgres:5432/gazole?sslmode=disable
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── C# API service ─────────────────────────────────────────
  api:
    build: ./api
    container_name: gazole_api
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=gazole;Username=gazole;Password=gazole"
    ports:
      - "5050:5000"
    depends_on:
      postgres:
        condition: service_healthy
      ingestion:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
